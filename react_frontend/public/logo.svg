<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rice grain background -->
  <defs>
    <linearGradient id="grain1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <linearGradient id="grain2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84cc16"/>
      <stop offset="100%" style="stop-color:#65a30d"/>
    </linearGradient>
  </defs>
  
  <!-- Stylized rice grains pattern -->
  <ellipse cx="25" cy="35" rx="8" ry="18" fill="url(#grain1)" transform="rotate(-30 25 35)"/>
  <ellipse cx="50" cy="30" rx="8" ry="18" fill="url(#grain1)" transform="rotate(0 50 30)"/>
  <ellipse cx="75" cy="35" rx="8" ry="18" fill="url(#grain1)" transform="rotate(30 75 35)"/>
  
  <!-- KJP Text -->
  <text x="50" y="72" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#166534" text-anchor="middle">KJP</text>
  
  <!-- Rice bowl accent -->
  <path d="M20 85 Q50 95 80 85 L75 90 Q50 100 25 90 Z" fill="url(#grain2)" opacity="0.8"/>
</svg>